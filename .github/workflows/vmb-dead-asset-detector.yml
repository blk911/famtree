name: VMB Dead Asset Detector

on:
  schedule:
    - cron: "47 11 * * *"
  workflow_dispatch:

jobs:
  dead-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run VMB Dead Asset Detector
        run: npm run qa:vmb:dead-assets
