name: VMB Placeholder Hunter

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

jobs:
  placeholder-hunter:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run VMB Placeholder Hunter
        run: npm run qa:vmb:placeholder-hunter
