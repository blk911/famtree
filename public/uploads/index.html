<!DOCTYPE html>
<html lang="viewport">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Value-Based Network</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .info {
            font-size: 14px;
            opacity: 0.9;
        }

        #network-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node:hover {
            filter: brightness(1.2);
        }

        .node-circle {
            stroke: white;
            stroke-width: 3;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
            transition: all 0.3s ease;
        }

        .node-label {
            fill: white;
            font-weight: bold;
            text-anchor: middle;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .link {
            stroke: rgba(255, 255, 255, 0.4);
            stroke-width: 2;
            transition: all 0.3s ease;
        }

        .link:hover {
            stroke: rgba(255, 255, 255, 0.8);
            stroke-width: 3;
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats div {
            margin: 5px 0;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Create a Value-Based Network</h1>
        <div class="info">Your client → client-favorite salons → each salon’s client network</div>
    </div>

    <div id="network-container">
        <div class="stats">
            <div style="font-weight: bold; margin-bottom: 8px;">Private Network Growth</div>
            <div>Total Members: <span id="node-count">1</span></div>
            <div>Active Relationships: <span id="link-count">0</span></div>
            <div>Network Depth: <span id="depth">1</span></div>
        </div>
        <div class="controls">
            <button onclick="resetNetwork()">Reset Network</button>
            <button onclick="autoExpand()">Grow Private Network</button>
        </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight - 100;
        const tooltip = document.getElementById('tooltip');
        
        let nodes = [];
        let links = [];
        let simulation;
        let nodeIdCounter = 0;

        const svg = d3.select('#network-container')
            .append('svg')
            .attr('width', width)
            .attr('height', height);

        const g = svg.append('g');

        // Zoom functionality
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on('zoom', (event) => {
                g.attr('transform', event.transform);
            });

        svg.call(zoom);

        // Initialize with main CL node
        function initNetwork() {
            nodes = [{
                id: nodeIdCounter++,
                label: 'Client',
                type: 'main',
                level: 0,
                x: width / 2,
                y: height / 2,
                fx: width / 2,
                fy: height / 2,
                expanded: false,
                color: '#FF6B6B'
            }];
            links = [];
            update();
        }

        function expandNode(node) {
            if (node.expanded) return;
            
            node.expanded = true;
            const angleStep = (Math.PI * 2) / (node.type === 'main' ? 8 : 20);
            const radius = node.type === 'main' ? 150 : 100;
            const childCount = node.type === 'main' ? 8 : 20;
            
            for (let i = 0; i < childCount; i++) {
                const angle = i * angleStep;
                const childNode = {
                    id: nodeIdCounter++,
                    label: node.type === 'main' ? `Fav Salon ${i + 1}` : `Salon Clients ${i + 1}`,
                    type: node.type === 'main' ? 'salon' : 'sub-cl',
                    level: node.level + 1,
                    x: node.x + Math.cos(angle) * radius,
                    y: node.y + Math.sin(angle) * radius,
                    parentId: node.id,
                    expanded: false,
                    color: node.type === 'main' ? '#4ECDC4' : '#95E77E'
                };
                
                nodes.push(childNode);
                links.push({
                    source: node.id,
                    target: childNode.id
                });
            }
            
            update();
            updateStats();
        }

        function update() {
            // Update links
            const link = g.selectAll('.link')
                .data(links, d => `${d.source.id || d.source}-${d.target.id || d.target}`);

            link.enter()
                .append('line')
                .attr('class', 'link')
                .merge(link);

            link.exit().remove();

            // Update nodes
            const node = g.selectAll('.node')
                .data(nodes, d => d.id);

            const nodeEnter = node.enter()
                .append('g')
                .attr('class', 'node')
                .on('click', (event, d) => {
                    if (d.type !== 'sub-cl') {
                        expandNode(d);
                    }
                })
                .on('mouseenter', (event, d) => {
                    tooltip.style.opacity = 1;
                    tooltip.style.left = event.pageX + 10 + 'px';
                    tooltip.style.top = event.pageY - 10 + 'px';
                    const growHint = d.type !== 'sub-cl' && !d.expanded
                        ? ' - Click to grow this relationship network'
                        : d.expanded ? ' - Expanded' : '';
                    tooltip.textContent = `${d.label} (Level ${d.level})${growHint}`;
                })
                .on('mouseleave', () => {
                    tooltip.style.opacity = 0;
                })
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));

            nodeEnter.append('circle')
                .attr('class', 'node-circle')
                .attr('r', d => d.type === 'main' ? 30 : d.type === 'salon' ? 20 : 12)
                .attr('fill', d => d.color);

            nodeEnter.append('text')
                .attr('class', 'node-label')
                .attr('dy', '.35em')
                .style('font-size', d => d.type === 'main' ? '14px' : d.type === 'salon' ? '11px' : '9px')
                .text(d => d.level <= 2 ? d.label : '');

            node.exit().remove();

            // Initialize or update force simulation
            if (!simulation) {
                simulation = d3.forceSimulation(nodes)
                    .force('link', d3.forceLink(links).id(d => d.id).distance(100).strength(0.5))
                    .force('charge', d3.forceManyBody().strength(-300))
                    .force('center', d3.forceCenter(width / 2, height / 2))
                    .force('collision', d3.forceCollide().radius(d => d.type === 'main' ? 40 : d.type === 'salon' ? 30 : 20))
                    .on('tick', ticked);
            } else {
                simulation.nodes(nodes);
                simulation.force('link').links(links);
                simulation.alpha(0.3).restart();
            }
        }

        function ticked() {
            g.selectAll('.link')
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);

            g.selectAll('.node')
                .attr('transform', d => `translate(${d.x},${d.y})`);
        }

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        function updateStats() {
            document.getElementById('node-count').textContent = nodes.length;
            document.getElementById('link-count').textContent = links.length;
            document.getElementById('depth').textContent = Math.max(...nodes.map(n => n.level)) + 1;
        }

        function resetNetwork() {
            nodeIdCounter = 0;
            initNetwork();
            updateStats();
        }

        async function autoExpand() {
            const mainNode = nodes.find(n => n.type === 'main');
            if (!mainNode.expanded) {
                expandNode(mainNode);
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
            
            const salons = nodes.filter(n => n.type === 'salon' && !n.expanded);
            for (const salon of salons) {
                expandNode(salon);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight - 100;
            svg.attr('width', newWidth).attr('height', newHeight);
            simulation.force('center', d3.forceCenter(newWidth / 2, newHeight / 2));
            simulation.alpha(0.3).restart();
        });

        // Initialize network
        initNetwork();
        updateStats();
    </script>
</body>
</html>
